version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: research_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - reports_data:/app/reports
      - memory_data:/app/memory
    networks:
      - research_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: research_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - research_network

volumes:
  reports_data:
  memory_data:

networks:
  research_network:
    driver: bridge
